<article class="course-card">
  <div class="course-card__image-wrapper">
    <img 
      class="course-card__image" 
      src="" 
      alt="Course thumbnail"
      onerror="this.style.display='none'"
    />
    <span class="course-card__level"></span>
  </div>
  
  <div class="course-card__body">
    <h3 class="course-card__title"></h3>
    <p class="course-card__description"></p>
    
    <div class="course-card__meta">
      <div class="course-card__meta-item">
        <strong>Duration:</strong>
        <span class="course-card__duration"></span>
      </div>
      <div class="course-card__meta-item">
        <strong>Trainer:</strong>
        <span class="course-card__trainer"></span>
      </div>
    </div>
    
    <div class="course-card__footer">
      <span class="course-card__price"></span>
      <button class="course-card__button" aria-label="View course details">
        View Details →
      </button>
    </div>
  </div>
</article>
