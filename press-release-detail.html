<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Read the latest official press releases from Metadise Academy." />
  <title>Press Release - Metadise Academy</title>
  <link rel="icon" href="assets/images/metadise-acad-logo-black&whitebg.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/press-release-detail.css" />
</head>
<body>
  <div data-component data-src="components/header.html"></div>

  <main class="press-release-detail">
    <section class="press-release-detail__section">
      <div class="container press-release-detail__container">
        <a class="press-release-detail__back" href="media.html">← Back to media</a>
        <p class="press-release-detail__meta" id="pressReleaseMeta"></p>
        <h1 class="press-release-detail__title" id="pressReleaseTitle">Loading press release...</h1>
        <p class="press-release-detail__excerpt" id="pressReleaseExcerpt"></p>
        <div class="press-release-detail__image-wrap" id="pressReleaseImageWrap" hidden>
          <img class="press-release-detail__image" id="pressReleaseImage" src="" alt="" />
        </div>
        <article class="press-release-detail__content" id="pressReleaseContent"></article>
      </div>
    </section>
  </main>

  <div data-component data-src="components/footer.html"></div>

  <script src="js/main.js"></script>
  <script src="js/press-release-detail.js"></script>
</body>
</html>
