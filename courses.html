<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Explore our comprehensive courses at Metadise Academy." />
  <title>Courses – Metadise Academy</title>
  <link rel="icon" href="assets/images/metadise-acad-logo-black&whitebg.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/courses.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

  <!-- ===================== HEADER ============================= -->
  <div data-component data-src="components/header.html"></div>

  <!-- ===================== COURSES PAGE ============================= -->

  <section class="course-hero" aria-labelledby="course-hero-title">
    <div class="course-hero__overlay"></div>

    <div class="course-hero__content">
      <h1 id="course-hero-title">Our Courses</h1>
    </div>
  </section>

  <section class="courses-listing" aria-labelledby="courses-list-title">
    <div class="container">
      <h2 class="section-title" id="courses-list-title">Featured Courses</h2>
      
      <div class="courses-grid" id="coursesGrid">
        <!-- Course cards will be rendered here by JavaScript -->
      </div>
    </div>
  </section>

  <!-- ===================== FOOTER ============================= -->
  <div data-component data-src="components/footer.html"></div>

  <script src="js/course-cards.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="js/main.js"></script>
