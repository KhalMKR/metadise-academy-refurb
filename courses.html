<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Explore our comprehensive courses at Metadise Academy." />
  <title>Courses – Metadise Academy</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/courses.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>

  <!-- ===================== HEADER ============================= -->
  <div data-component data-src="components/header.html"></div>

  <!-- ===================== COURSES PAGE ============================= -->
  <section class="courses-page" aria-labelledby="courses-page-title">
    <div class="container">
      <h1 class="courses-page__title" id="courses-page-title">Our Courses</h1>
      <p class="courses-page__subtitle">Choose from our selection of industry-leading courses designed to accelerate your career.</p>
    </div>
  </section>

  <!-- ===================== COURSES LISTING ============================= -->
  <section class="courses-listing" aria-labelledby="courses-list-title">
    <div class="container">
      <h2 class="section-title" id="courses-list-title">Featured Courses</h2>
      
      <div class="courses-grid" id="coursesGrid">
        <!-- Course cards will be rendered here by JavaScript -->
      </div>
    </div>
  </section>

  <!-- ===================== FOOTER ============================= -->
  <div data-component data-src="components/footer.html"></div>

  <script src="js/main.js"></script>
</body>
</html>
