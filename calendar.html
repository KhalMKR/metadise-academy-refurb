<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta
		name="description"
		content="View upcoming Metadise Academy events, workshops, and key dates in our calendar."
	/>
	<title>Calendar - Metadise Academy</title>
	<link rel="icon" href="assets/images/metadise-acad-logo-black&whitebg.png" />

	<link rel="stylesheet" href="css/styles.css" />
	<link rel="stylesheet" href="css/header.css" />
	<link rel="stylesheet" href="css/footer.css" />
	<link rel="stylesheet" href="css/calendar.css" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
	<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
</head>
<body>
	<div data-component data-src="components/header.html"></div>

	 <!-- CALENDAR HERO -->
  <section class="calendar-hero" aria-labelledby="calendar-hero-title">
    <div class="calendar-hero__overlay"></div>

    <div class="calendar-hero__content">
      <h1 id="calendar-hero-title" data-aos="fade-up" data-aos-delay="100">Academy Calendar</h1>
    </div>
  </section>

	<section class="calendar-page" aria-labelledby="calendar-month-label">
		<div class="container calendar-layout">
			<article class="calendar-card" aria-label="Monthly calendar">
				<header class="calendar-toolbar">
					<div class="calendar-toolbar__controls">
						<button type="button" class="calendar-btn" id="prevMonthBtn" aria-label="Previous month">
							Prev
						</button>
						<button type="button" class="calendar-btn" id="todayBtn" aria-label="Jump to current month">
							This Month
						</button>
						<button type="button" class="calendar-btn" id="nextMonthBtn" aria-label="Next month">
							Next
						</button>
					</div>

					<h2 id="calendar-month-label" class="calendar-month"></h2>
				</header>

				<div class="calendar-grid" id="calendarGrid" role="grid" aria-live="polite"></div>
			</article>
		</div>
	</section>

	<div data-component data-src="components/footer.html"></div>

	<script src="https://unpkg.com/aos@2.3.4/dist/aos.js" defer></script>
	<script src="js/main.js?v=2026.05.12.1" defer></script>
	<script src="js/calendar.js?v=1.0.0" defer></script>
</body>
</html>
