<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta
    name="description"
    content="Contact Metadise Academy for course enquiries, training details, and collaboration opportunities."
  />

  <title>Contact Us | Metadise Academy</title>
  <link rel="icon" href="assets/images/metadise-acad-logo-black&whitebg.png" />

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/contact.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
</head>

<body>

  <!-- HEADER -->
  <div data-component data-src="components/header.html"></div>

  <!-- CONTACT HERO -->
  <section class="contact-hero" aria-labelledby="contact-hero-title">
    <div class="contact-hero__overlay"></div>

    <div class="contact-hero__content">
      <h1 id="contact-hero-title" data-aos="fade-up" data-aos-delay="100">We Would Love to Hear from You</h1>
    </div>
  </section>

  <!-- CONTACT MAIN -->
  <section class="contact-page">
    <div class="contact-page__container">

      <!-- LEFT SIDE -->
      <div class="contact-info">
        <div class="contact-info__text">
          <h2>Get in Touch with Us</h2>
          <p>We’ll do our best to respond within 1–2 working days.</p>
        </div>

        <div class="contact-info__image-container">
          <div class="faded-image-container"></div>
          <div class="contact-info__image">
          <img
            src="assets/images/customer-service.png"
            alt="Customer support representative"
            onerror="this.style.display='none'"
          />
        </div>
        </div>
      </div>

      <!-- RIGHT SIDE FORM -->
      <div class="contact-card">
        <h2>Contact Us</h2>

        <form id="contactForm" class="contact-page-form">

          <div class="form-group">
            <label for="name">Full Name <span>*</span></label>
            <input
              type="text"
              id="name"
              name="from_name"
              autocomplete="name"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email <span>*</span></label>
            <input
              type="email"
              id="email"
              name="from_email"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group">
            <label for="phone">Phone Number <span>*</span></label>
            <input
              type="tel"
              id="phone"
              name="phone_number"
              autocomplete="tel"
              required
            />
          </div>

          <div class="form-group">
            <label for="course">Course <span>*</span></label>
            <select id="course" name="course" required>
              <option value="">Select Course</option>
              <option value="Bitcoin & Blockchain 101">Bitcoin & Blockchain 101</option>
              <option value="Mastering Machine Learning: Algorithms & Models for Next: Gen-AI Solutions">Mastering Machine Learning: Algorithms & Models for Next: Gen-AI Solutions</option>
              <option value="AI in Human Resources Management">AI in Human Resources Management</option>
              <option value="Big Data Analytics: Unleashing Insights in the Age of Automation">Big Data Analytics: Unleashing Insights in the Age of Automation</option>
              <option value="Blockchain & Fintech Basics">Blockchain & Fintech Basics</option>
              <option value="AI & Machine Learning Fundamentals">AI & Machine Learning Fundamentals</option>
              <option value="Blockchain Applications in Finance">Blockchain Applications in Finance</option>
              <option value="Blockchain Governance and Compliance">Blockchain Governance and Compliance</option>
              <option value="Cybersecurity Essentials: Building Practical Skills for Today’s Digital Workforce">Cybersecurity Essentials: Building Practical Skills for Today’s Digital Workforce</option>
              <option value="Beginner Content Creator Bootcamp: TikTok, Mobile Videography, Editing & Personal IP">Beginner Content Creator Bootcamp: TikTok, Mobile Videography, Editing & Personal IP</option>
              <option value="Boost Productivity with Generative AI">Boost Productivity with Generative AI</option>
              <option value="Digitalisation Masterclass – Future-Proof Your Business">Digitalisation Masterclass – Future-Proof Your Business</option>
              <option value="Blockchain Applications and Smart Contracts">Blockchain Applications and Smart Contracts</option>
              <option value="Click Wisely: Everyday Internet Safety">Click Wisely: Everyday Internet Safety</option>
              <option value="Principles of E-Commerce">Principles of E-Commerce</option>
              <option value="Introduction to Generative AI and Large Language Models">Introduction to Generative AI and Large Language Models</option>
              <option value="Introduction to Digital Economics">Introduction to Digital Economics</option>
              <option value="Cybersecurity Essentials: Building Practical Skills for Today’s Digital Workforce">Cybersecurity Essentials: Building Practical Skills for Today’s Digital Workforce</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">Message <span>*</span></label>
            <textarea
              id="message"
              name="message"
              rows="5"
              required
            ></textarea>
          </div>

          <button type="submit" class="contact-submit">
            Send Message
          </button>

          <p id="formStatus" class="form-status"></p>

        </form>
      </div>

    </div>
  </section>

   <!-- ===================== FOOTER =========================== -->
  
  <div data-component data-src="components/footer.html"></div>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="js/index-courses.js"></script>

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="js/main.js"></script>
  <script src="js/contact.js"></script>

</body>
</html>
