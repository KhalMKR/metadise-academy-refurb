<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Metadise Academy – Learn. Build. Grow. Explore our expert-led courses in web development, design, and more." />
  <title>Metadise Academy</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/hero.css" />
  <link rel="stylesheet" href="css/why-section.css" />
  <link rel="stylesheet" href="css/footer.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/courses.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>

  <!-- ===================== HEADER ============================= -->
  <div data-component data-src="components/header.html"></div>

  <!-- ===================== HERO ============================= -->
  <div data-component="hero" data-src="components/hero.html"></div>

  <!-- ===================== WELCOME ========================== -->
  <section class="welcome" id="welcome" aria-labelledby="welcome-title">
    <div class="container">
      <h1 class="welcome-title" id="welcome-title">Welcome to Metadise Academy</h1>
      <p class="welcome-text">Welcome to Metadise Academy — empowering learners to learn, build, and grow with industry-led courses and a supportive community.</p>
    </div>
  </section>

  <div data-component data-src="components/featured-courses.html"></div>

  <!-- ===================== WHY SECTION ===================== -->
  <div data-component data-src="components/why-section.html"></div>

  <!-- ===================== PARTNERS ======================== -->
  <section class="partners" id="partners" aria-labelledby="partners-title">
    <div class="container">
      <h2 class="section-title" id="partners-title">Our Partners</h2>
      <p class="section-subtitle">Organizations we collaborate with to support learning, growth, and opportunity.</p>

      <div class="partners-grid" aria-label="Partner logos">
        <figure class="partner-logo">
          <img src="assets/images/msr-logo-white.png" alt="MSR logo" loading="lazy" />
        </figure>
        <figure class="partner-logo">
          <img src="assets/images/pangu-logo.png" alt="Pangu logo" loading="lazy" />
        </figure>
        <figure class="partner-logo">
          <img src="assets/images/ukiss%20logo.svg" alt="UKISS logo" loading="lazy" />
        </figure>
      </div>
    </div>
  </section>

  <!-- ===================== EVENT HIGHLIGHT ================= -->
  <div data-component data-src="components/event-highlight.html"></div>

  <!-- ===================== PORTFOLIOS ====================== -->
  <div data-component data-src="components/portfolios.html"></div>

  <!-- ===================== FOOTER =========================== -->
  
  <div data-component data-src="components/footer.html"></div>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/main.js"></script>
  <script src="js/index-courses.js"></script>

</body>
</html>
